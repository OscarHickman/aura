name: Daily Paper Digest

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 06:00 UTC
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write         # Needed to push the DB back to the repo

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Email Config
      run: |
        mkdir -p user_credentials
        cat <<EOF > user_credentials/email_config.json
        {
          "smtp_host": "${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}",
          "smtp_port": ${{ secrets.SMTP_PORT || 587 }},
          "smtp_username": "${{ secrets.SMTP_USERNAME }}",
          "smtp_password": "${{ secrets.SMTP_PASSWORD }}",
          "from_email": "${{ secrets.FROM_EMAIL }}",
          "to_email": "${{ secrets.TO_EMAIL }}",
          "use_tls": true,
          "use_ssl": false,
          "subject_prefix": "AURA - Daily Digest"
        }
        EOF

    - name: Run Fetch
      run: python run.py fetch

    - name: Run Summarize
      env:
        LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python run.py summarize --limit 20

    - name: Run Retrain
      run: python run.py retrain

    - name: Send Email Digest
      run: python run.py email-digest --top-n 3 --email-config user_credentials/email_config.json

    - name: Commit and Push Database
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add only the data directory
        git add data/
        
        # Commit if there are changes
        if ! git diff-index --quiet HEAD; then
          git commit -m "chore: update paper database and model [skip ci]"
          git push
        else
          echo "No database changes to commit."
        fi
