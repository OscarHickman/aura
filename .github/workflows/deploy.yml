name: Build and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Downcase REPO
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Generate image tags
        id: image-tags
        run: |
          TAGS="ghcr.io/${{ env.REPO }}:latest,ghcr.io/${{ env.REPO }}:${{ github.sha }}"
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAGS="${TAGS},ghcr.io/${{ env.REPO }}:${{ github.event.release.tag_name }}"
          fi
          if [ "${{ secrets.DOCKERHUB_USERNAME }}" != "" ]; then
            TAGS="${TAGS},${{ secrets.DOCKERHUB_USERNAME }}/aura:latest,${{ secrets.DOCKERHUB_USERNAME }}/aura:${{ github.sha }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        if: ${{ env.TAILSCALE_AUTHKEY != '' }}
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Sync compose file to server
        if: ${{ env.DEPLOY_SSH_HOST != '' && env.DEPLOY_SSH_USER != '' && env.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          source: "deploy/docker-compose.yml"
          target: "/home/${{ secrets.DEPLOY_SSH_USER }}/docker/aura"
          strip_components: 1

      - name: Remote deploy via SSH
        if: ${{ env.DEPLOY_SSH_HOST != '' && env.DEPLOY_SSH_USER != '' && env.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          envs: GH_TOKEN
          script: |
            set -e
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            TAG="${{ github.event.release.tag_name }}"
            TAG="${TAG:-latest}"
            echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            mkdir -p ~/docker/aura
            { echo "IMAGE=ghcr.io/$REPO"; echo "TAG=$TAG"; } > ~/docker/aura/.env
            cd ~/docker/aura
            docker compose pull
            docker compose up -d
