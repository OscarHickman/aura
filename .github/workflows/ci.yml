name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint, Test and Smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: v2-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install ruff gunicorn

      - name: Lint with ruff
        run: ruff check .

      - name: Run mypy type check
        run: mypy .

      - name: Run unit tests
        env:
          LLM_API_KEY: dummy-test-key
          GROQ_API_KEY: dummy-test-key
          OPENAI_API_KEY: dummy-test-key
          ANTHROPIC_API_KEY: dummy-test-key
          GOOGLE_API_KEY: dummy-test-key
        run: pytest --cov=aura --cov-fail-under=80

      - name: Start Gunicorn (smoke)
        run: |
          nohup gunicorn "deploy.wsgi:app" -w 2 -b 127.0.0.1:5000 > gunicorn.log 2>&1 & echo $! > gunicorn.pid
          sleep 2

      - name: Smoke test /health endpoint
        run: |
          curl -f http://127.0.0.1:5000/health

      - name: Stop Gunicorn
        if: always()
        run: |
          kill $(cat gunicorn.pid) || true
