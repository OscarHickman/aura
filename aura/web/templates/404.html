{% extends "base.html" %}
{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 text-warning mb-4"><i class="bi bi-exclamation-triangle"></i> 404</h1>
            <h2 class="mb-3">Resource Not Found</h2>
            <p class="lead text-muted mb-4">
                The paper or page you are looking for does not exist in the database or could not be found.
            </p>
            <a href="/" class="btn btn-primary"><i class="bi bi-house"></i> Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
