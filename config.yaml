# AURA Configuration
# Edit this file to customize your paper recommendations

# arXiv categories to fetch papers from
# Full list: https://arxiv.org/category_taxonomy
categories:
  - astro-ph.CO   # Cosmology and Nongalactic Astrophysics
  - astro-ph.GA   # Astrophysics of Galaxies
  - astro-ph.HE   # High Energy Astrophysical Phenomena
  - astro-ph.SR   # Solar and Stellar Astrophysics
  - astro-ph.IM   # Instrumentation and Methods for Astrophysics (essential for cosmological computation and analysis)
# Optional categories (e.g. for machine learning and statistical methods in cosmology):
#  - cs.LG        # Machine Learning (Computer Science)
#  - stat.ML      # Machine Learning (Statistics)

# Where to store the database, model weights, etc.
data_dir: data

# Sentence-transformer model for paper embeddings
# "all-MiniLM-L6-v2" is a good balance of speed and quality (384-dim)
# "all-mpnet-base-v2" is higher quality but slower (768-dim)
embedding_model: all-MiniLM-L6-v2

# LLM settings for AI summaries (optional)
# Supported providers: "groq" (free, fast), "openai", "anthropic"
# Set the environment variable LLM_PROVIDER and LLM_API_KEY to enable
# Example: 
#   export LLM_PROVIDER=groq
#   export LLM_API_KEY=your_groq_api_key_here
# Get a free Groq API key at https://console.groq.com

# Web server settings
host: 127.0.0.1
port: 5000
debug: false

# Fetch settings
fetch:
  max_results: 200     # Max papers per fetch
  days_back: 2         # How many days back to look

# Summaries are launched separately from fetch by default.
summaries:
  generate_on_fetch: false
  batch_size: 20

# Scheduler (for automatic daily fetching)
scheduler:
  enabled: false
  fetch_hour: 6        # Hour (UTC) to auto-fetch (6 AM UTC)
  fetch_minute: 0
